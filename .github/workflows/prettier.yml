name: Prettier Fix

on:
  push:
    branches: [ "main" ]

jobs:
  format:
    name: Auto Clean Code
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Prettier
        run: npx prettier --write . --ignore-unknown

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "System: Automated code formatting"
