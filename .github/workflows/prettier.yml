name: Deep-Clean-Format

on:
  push:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Global Code Sanitization
        run: |
          npm install --save-dev prettier
          npx prettier --write "src/**/*.{js,jsx,ts,tsx,json,css}"
          npx prettier --write "app.json" "package.json" "eas.json" --ignore-unknown

      - name: Secure Sync
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: optimize code structure and fix casing for expo router"
          file_pattern: 'src/** app.json package.json eas.json'
