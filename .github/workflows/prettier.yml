name: Prettier Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  format:
    name: Auto Clean Code
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Prettier Formatting
        run: npx prettier --write . --ignore-path .github/workflows/* --ignore-unknown

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "System: Automated code formatting"
          branch: main
