Name: Deep Clean and Format

on:
  push:
    branches: [main]

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Using your existing GitHub Token for secure access
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prettier Auto-Fix
        uses: creyder/prettier_action@v4.3
        with:
          prettier_options: >
            --write "src/**/*.{js,jsx,json,css}" 
            package.json 
            app.json 
            --ignore-unknown 
            --ignore-path .gitignore
          
          install_plugins: false
          
          # Custom commit message to prevent re-triggering builds
          commit_message: "chore: deep clean and formatting [skip ci]"
          
          # Securely pushing changes back using the token
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Success Notification
        run: echo "Clean-up successful. No extra builds consumed."
