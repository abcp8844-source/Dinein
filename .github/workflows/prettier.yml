name: Prettier Fix

on:
  push:
    branches: [ "main" ]

jobs:
  format:
    name: Auto Clean
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Format
        run: npx prettier --write . --ignore-unknown
        continue-on-error: true

      - name: Push Clean Code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "System: Automated code cleaning"
