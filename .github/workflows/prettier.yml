name: Deep Clean and Format

on:
  push:
    branches: [main]

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Prettier Clean-up
        run: npx prettier --write "src/**/*.{js,jsx,json,css}" --ignore-unknown

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated deep clean of src folder [skip ci]"
          file_pattern: 'src/** package.json app.json'
