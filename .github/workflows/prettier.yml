name: Global-Optimizer-System

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deep-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Initialize-Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Setup-Node-Environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install-Core-Optimization-Tools
        run: |
          npm install eslint prettier eslint-plugin-unused-imports --save-dev

      - name: Execute-Deep-Scan-And-Auto-Fix
        # This step removes unused variables, imports, and formats the code
        run: |
          npx eslint . --ext .js,.jsx,.ts,.tsx --fix || true
          npx prettier --write . --ignore-unknown --ignore-path ".github/workflows/**"

      - name: Push-Clean-Code-To-Repository
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "System: Optimization-Complete-Unused-Assets-Removed"
          branch: main
          push_options: "--force"

      - name: Generation-Of-Final-Cleaning-Report
        if: steps.auto_commit.outputs.changes_detected == 'true'
        run: |
          echo "--- ANALYSIS REPORT ---"
          echo "Status: Deep Scan Successful"
          echo "Modified Files List:"
          git diff --name-only HEAD^ HEAD
