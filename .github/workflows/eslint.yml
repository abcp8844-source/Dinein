name: ESLint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  eslint:
    name: Run eslint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
      actions: read 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install eslint@8.10.0 @microsoft/eslint-formatter-sarif@3.1.0 --save-dev

      - name: Clean and Generate Report
        # This command runs fix and creates the SARIF file in one go
        run: |
          npx eslint . --ext .js,.jsx,.ts,.tsx --fix --format @microsoft/eslint-formatter-sarif --output-file eslint-results.sarif || true

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() # This ensures it tries to upload even if errors exist
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true
